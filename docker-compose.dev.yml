services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: coffee
      POSTGRES_USER: coffee
      POSTGRES_PASSWORD: coffee
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coffee"]
      interval: 5s
      timeout: 3s
      retries: 10
