spring:
  application:
    name: coffee-platform
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/coffee}
    username: ${SPRING_DATASOURCE_USERNAME:coffee}
    password: ${SPRING_DATASOURCE_PASSWORD:coffee}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    contexts: ${LIQUIBASE_CONTEXTS:demo}
  jackson:
    default-property-inclusion: non_null

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:dev-only-secret-change-me-0123456789abcdef}
  expires-seconds: ${JWT_EXPIRES_SECONDS:3600}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health
