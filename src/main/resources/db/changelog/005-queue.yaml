databaseChangeLog:
  - changeSet:
      id: 005-queue
      author: coffee
      changes:
        - sql:
            sql: |
              CREATE TABLE queue (
                id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                shop_id BIGINT NOT NULL REFERENCES shop(id),
                label VARCHAR(40) NOT NULL,
                max_size INT NOT NULL CHECK (max_size > 0),
                position_index INT NOT NULL CHECK (position_index BETWEEN 0 AND 2),
                active BOOLEAN NOT NULL DEFAULT TRUE,
                UNIQUE (shop_id, position_index)
              );
      rollback:
        - sql: { sql: "DROP TABLE queue;" }
