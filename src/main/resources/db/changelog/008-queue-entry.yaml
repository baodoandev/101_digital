databaseChangeLog:
  - changeSet:
      id: 008-queue-entry
      author: coffee
      changes:
        - sql:
            sql: |
              CREATE TABLE queue_entry (
                id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                queue_id BIGINT NOT NULL REFERENCES queue(id),
                order_id BIGINT NOT NULL UNIQUE REFERENCES cust_order(id),
                customer_id BIGINT NOT NULL REFERENCES customer(id),
                status VARCHAR(20) NOT NULL CHECK (status IN ('WAITING','SERVED','CANCELLED')),
                joined_at TIMESTAMPTZ NOT NULL,
                served_at TIMESTAMPTZ
              );
              CREATE INDEX idx_queue_entry_next ON queue_entry (queue_id, status, joined_at);
      rollback:
        - sql: { sql: "DROP TABLE queue_entry;" }
