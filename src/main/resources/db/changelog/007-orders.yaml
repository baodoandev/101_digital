databaseChangeLog:
  - changeSet:
      id: 007-orders
      author: coffee
      changes:
        - sql:
            sql: |
              CREATE TABLE cust_order (
                id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                customer_id BIGINT NOT NULL REFERENCES customer(id),
                shop_id BIGINT NOT NULL REFERENCES shop(id),
                status VARCHAR(20) NOT NULL CHECK (status IN ('PLACED','WAITING','FULFILLED','CANCELLED')),
                total_minor BIGINT NOT NULL,
                idempotency_key VARCHAR(80),
                placed_at TIMESTAMPTZ NOT NULL,
                fulfilled_at TIMESTAMPTZ,
                cancelled_at TIMESTAMPTZ
              );
              CREATE INDEX idx_cust_order_shop_status ON cust_order (shop_id, status);
              CREATE INDEX idx_cust_order_customer ON cust_order (customer_id);
              CREATE UNIQUE INDEX uq_cust_order_idem ON cust_order (customer_id, idempotency_key)
                WHERE idempotency_key IS NOT NULL;
              CREATE TABLE order_item (
                id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                order_id BIGINT NOT NULL REFERENCES cust_order(id),
                menu_item_id BIGINT NOT NULL REFERENCES menu_item(id),
                item_name VARCHAR(150) NOT NULL,
                unit_price_minor BIGINT NOT NULL,
                quantity INT NOT NULL CHECK (quantity > 0)
              );
              CREATE INDEX idx_order_item_order ON order_item (order_id);
      rollback:
        - sql: { sql: "DROP TABLE order_item; DROP TABLE cust_order;" }
