databaseChangeLog:
  - changeSet:
      id: 003-shop
      author: coffee
      changes:
        - sql:
            sql: |
              CREATE TABLE shop (
                id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                owner_id BIGINT NOT NULL REFERENCES app_user(id),
                name VARCHAR(150) NOT NULL,
                contact_phone VARCHAR(40),
                contact_email VARCHAR(255),
                address_line VARCHAR(255),
                city VARCHAR(120),
                country VARCHAR(2),
                latitude DOUBLE PRECISION NOT NULL,
                longitude DOUBLE PRECISION NOT NULL,
                location GEOGRAPHY(POINT,4326) GENERATED ALWAYS AS
                  (ST_SetSRID(ST_MakePoint(longitude, latitude), 4326)::geography) STORED,
                timezone VARCHAR(64) NOT NULL,
                currency VARCHAR(3) NOT NULL,
                opening_time TIME NOT NULL,
                closing_time TIME NOT NULL,
                avg_service_seconds INT NOT NULL DEFAULT 180,
                status VARCHAR(20) NOT NULL DEFAULT 'ACTIVE' CHECK (status IN ('ACTIVE','INACTIVE')),
                created_at TIMESTAMPTZ NOT NULL DEFAULT now(),
                updated_at TIMESTAMPTZ
              );
              CREATE INDEX idx_shop_location ON shop USING GIST (location);
              CREATE INDEX idx_shop_country_city ON shop (country, city);
              CREATE TABLE operator_assignment (
                id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                user_id BIGINT NOT NULL REFERENCES app_user(id),
                shop_id BIGINT NOT NULL REFERENCES shop(id),
                UNIQUE (user_id, shop_id)
              );
      rollback:
        - sql: { sql: "DROP TABLE operator_assignment; DROP TABLE shop;" }
