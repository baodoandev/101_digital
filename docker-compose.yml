services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-coffee}
      POSTGRES_USER: ${POSTGRES_USER:-coffee}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-coffee}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-coffee}"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-coffee}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-coffee}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-coffee}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      LIQUIBASE_CONTEXTS: ${LIQUIBASE_CONTEXTS:-demo}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars!!}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
